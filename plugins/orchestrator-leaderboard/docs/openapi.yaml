openapi: 3.1.0
info:
  title: NaaP Orchestrator Leaderboard API
  version: 1.0.0
  description: |
    Public REST API exposed by the **orchestrator-leaderboard** plugin.

    The API lets external SDKs and gateways:

    1. **Build a discovery plan** — declare a reusable orchestrator selection
       policy (capabilities + filters + SLA weights + sort).
    2. **Push the plan** — `POST /plans` persists it server-side and returns a
       stable `id`.
    3. **Get plan-executed results** — `GET /plans/{id}/results` returns the
       latest ranked orchestrators per capability, lazily evaluated and cached.

    For ad-hoc, stateless ranking (no persisted plan) use `POST /rank`.

    Source of truth:
      - Routes: `apps/web-next/src/app/api/v1/orchestrator-leaderboard/**`
      - Schemas: `apps/web-next/src/lib/orchestrator-leaderboard/types.ts`
      - Persistence: `prisma model DiscoveryPlan` (`plugin_orchestrator_leaderboard` schema)
  contact:
    name: NaaP Team
    email: team@naap.io
    url: https://naap.io
  license:
    name: MIT
    identifier: MIT

servers:
  - url: https://{host}
    description: Self-hosted NaaP deployment
    variables:
      host:
        default: app.naap.io
        description: NaaP web-next host (no trailing slash)
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Discovery Plans
    description: |
      Persisted, reusable orchestrator-selection policies. The recommended
      integration path for SDKs and signers.
  - name: Ad-hoc Ranking
    description: Stateless ranking — useful for one-off queries and dashboards.
  - name: Capabilities
    description: Discover which capabilities the network advertises.
  - name: Dataset
    description: Read-only access to the cached global dataset and its config.
  - name: Admin
    description: Operations restricted to `system:admin` users or Vercel Cron.

security:
  - bearerJwt: []
  - bearerApiKey: []

paths:
  /api/v1/orchestrator-leaderboard/plans:
    get:
      tags: [Discovery Plans]
      summary: List the caller's discovery plans
      operationId: listPlans
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanListEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }

    post:
      tags: [Discovery Plans]
      summary: Create (build & push) a discovery plan
      operationId: createPlan
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePlanInput" }
            examples:
              minimal:
                summary: Minimum viable plan
                value:
                  billingPlanId: my-team-image-pipeline
                  name: My Image Pipeline
                  capabilities: [text-to-image]
              fullyConfigured:
                summary: Filtered + SLA-weighted plan
                value:
                  billingPlanId: prod-stream-v1
                  name: Production Stream Diffusion
                  description: Latency-sensitive streaming with VRAM floor
                  capabilities: [streamdiffusion-sdxl, streamdiffusion-sdxl-v2v]
                  topN: 15
                  sortBy: slaScore
                  slaMinScore: 0.6
                  slaWeights: { latency: 0.5, swapRate: 0.3, price: 0.2 }
                  filters:
                    gpuRamGbMin: 16
                    maxAvgLatencyMs: 400
                    maxSwapRatio: 0.2
      responses:
        "201":
          description: Plan created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/DiscoveryPlan" }
        "400":
          description: Validation failure or duplicate `billingPlanId`
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/orchestrator-leaderboard/plans/{id}:
    parameters:
      - $ref: "#/components/parameters/PlanId"
    get:
      tags: [Discovery Plans]
      summary: Get a discovery plan definition
      operationId: getPlan
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          plan: { $ref: "#/components/schemas/DiscoveryPlan" }
                        required: [plan]
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Discovery Plans]
      summary: Update a discovery plan
      operationId: updatePlan
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdatePlanInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          plan: { $ref: "#/components/schemas/DiscoveryPlan" }
                        required: [plan]
        "400":
          description: Validation failure
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Discovery Plans]
      summary: Delete a discovery plan
      operationId: deletePlan
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, const: true }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/orchestrator-leaderboard/plans/{id}/results:
    parameters:
      - $ref: "#/components/parameters/PlanId"
    get:
      tags: [Discovery Plans]
      summary: Get the latest evaluated results for a plan
      description: |
        Lazy evaluation:

        - If a fresh evaluation is cached, returns immediately (`X-Cache-Age`
          will be > 0).
        - Otherwise the plan is evaluated against the latest global dataset,
          cached, and returned.

        Disabled plans return `400`.
      operationId: getPlanResults
      responses:
        "200":
          description: Ok
          headers:
            Cache-Control:
              schema: { type: string, example: "private, max-age=10" }
            X-Cache-Age:
              schema: { type: integer, description: "Cache age in milliseconds" }
            X-Refresh-Interval:
              schema: { type: integer, description: "Configured refresh interval in milliseconds" }
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          data: { $ref: "#/components/schemas/PlanResults" }
                        required: [data]
        "400":
          description: Plan disabled or evaluation failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/orchestrator-leaderboard/plans/seed:
    post:
      tags: [Discovery Plans]
      summary: Seed 4 demo plans for the caller
      description: |
        Idempotent — skips templates whose `billingPlanId` already exists
        for the caller. Useful for onboarding and demos.
      operationId: seedDemoPlans
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          created: { type: integer, minimum: 0 }
                          total: { type: integer, minimum: 0 }
                        required: [created, total]
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/orchestrator-leaderboard/plans/refresh:
    post:
      tags: [Admin]
      summary: Bulk-refresh all enabled plans (cron)
      description: |
        Protected by `CRON_SECRET` — the request must carry
        `Authorization: Bearer ${CRON_SECRET}`. JWT and API-key auth are
        rejected.

        Used by the platform's Vercel Cron schedule.
      operationId: refreshAllPlans
      security:
        - bearerCronSecret: []
      responses:
        "200":
          description: Refresh completed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          refreshed: { type: integer, minimum: 0 }
                          failed: { type: integer, minimum: 0 }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500":
          description: Refresh failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /api/v1/orchestrator-leaderboard/rank:
    post:
      tags: [Ad-hoc Ranking]
      summary: Stateless ranked query
      description: |
        Returns top-N orchestrators for a single capability. Honours optional
        post-query `filters` and an optional `slaWeights` re-rank. Server caches
        ClickHouse results per capability for ~10 seconds.
      operationId: rank
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RankRequest" }
            examples:
              defaultRank:
                value: { capability: streamdiffusion-sdxl, topN: 5 }
              slaWeighted:
                value:
                  capability: streamdiffusion-sdxl
                  topN: 10
                  filters: { gpuRamGbMin: 16, maxAvgLatencyMs: 500, maxSwapRatio: 0.3 }
                  slaWeights: { latency: 0.5, swapRate: 0.3, price: 0.2 }
      responses:
        "200":
          description: Ranked rows
          headers:
            Cache-Control:
              schema: { type: string, example: "private, max-age=10" }
            X-Cache:
              schema: { type: string, enum: [HIT, MISS] }
            X-Cache-Age:
              schema: { type: integer, description: "Seconds since the cached query was filled" }
            X-Data-Freshness:
              schema: { type: string, format: date-time }
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/OrchestratorRow" }
        "400":
          description: Validation failure
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "502":
          description: ClickHouse / gateway upstream error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "504":
          description: ClickHouse query exceeded the 15s timeout
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /api/v1/orchestrator-leaderboard/filters:
    get:
      tags: [Capabilities]
      summary: List available capabilities
      description: |
        Returns capability names seen warm in the last hour. Falls back to a
        hard-coded list when ClickHouse is unreachable (signalled by
        `fromFallback: true`). Cached for 60 seconds.
      operationId: listCapabilities
      responses:
        "200":
          description: Ok
          headers:
            Cache-Control:
              schema: { type: string, example: "private, max-age=60" }
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          capabilities:
                            type: array
                            items: { type: string }
                          fromFallback: { type: boolean }
                        required: [capabilities, fromFallback]
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/orchestrator-leaderboard/dataset:
    get:
      tags: [Dataset]
      summary: Get the cached global dataset
      description: |
        Returns every capability and its orchestrator rows from the latest
        global refresh, plus refresh metadata. When the dataset hasn't been
        populated yet, returns `populated: false` with empty `capabilities`.
      operationId: getDataset
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/DatasetSnapshot" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/orchestrator-leaderboard/dataset/config:
    get:
      tags: [Dataset]
      summary: Read dataset refresh config
      operationId: getDatasetConfig
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/DatasetConfig" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    put:
      tags: [Admin]
      summary: Update the dataset refresh interval (admin)
      operationId: updateDatasetConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshIntervalHours]
              properties:
                refreshIntervalHours:
                  type: integer
                  enum: [1, 4, 8, 12]
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/DatasetConfig" }
        "400":
          description: Invalid interval
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/orchestrator-leaderboard/dataset/refresh:
    post:
      tags: [Admin]
      summary: Trigger a global dataset refresh
      description: |
        Two auth paths:

        1. **CRON_SECRET** — Vercel cron (hourly). Honours the configured
           refresh interval and skips if the dataset is still fresh.
        2. **User JWT with `system:admin`** — manual *Refresh Now* from the
           admin UI; bypasses the time gate.
      operationId: refreshDataset
      security:
        - bearerJwt: []
        - bearerCronSecret: []
      responses:
        "200":
          description: Refresh executed or skipped
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        oneOf:
                          - type: object
                            properties:
                              refreshed: { type: boolean }
                              capabilities: { type: integer }
                              orchestrators: { type: integer }
                          - type: object
                            properties:
                              skipped: { type: boolean, const: true }
                              reason: { type: string }
                              nextRefreshInMs: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500":
          description: Refresh failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /api/v1/orchestrator-leaderboard/sources:
    get:
      tags: [Admin]
      summary: List configured data sources
      description: Returns all data sources with their priority, enabled status, and config.
      operationId: listSources
      responses:
        "200":
          description: Source list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/LeaderboardSource" }
        "401": { $ref: "#/components/responses/Unauthorized" }

    put:
      tags: [Admin]
      summary: Update data source priority and enabled status
      description: |
        Atomic upsert of source configurations. Requires `system:admin` role.
        The source with the lowest `priority` number owns orchestrator membership.
      operationId: updateSources
      security:
        - bearerJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sources]
              properties:
                sources:
                  type: array
                  minItems: 1
                  maxItems: 10
                  items:
                    type: object
                    required: [kind, enabled, priority]
                    properties:
                      kind: { $ref: "#/components/schemas/SourceKind" }
                      enabled: { type: boolean }
                      priority: { type: integer, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: Updated source list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/LeaderboardSource" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/orchestrator-leaderboard/audits:
    get:
      tags: [Admin]
      summary: List recent refresh audit records
      description: Paginated list of refresh audit records with per-source stats, conflicts, and dropped orchestrators.
      operationId: listAudits
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: cursor
          in: query
          schema: { type: string }
          description: Opaque cursor for keyset pagination
      responses:
        "200":
          description: Audit list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/RefreshAudit" }
                      pagination:
                        type: object
                        properties:
                          nextCursor: { type: [string, "null"] }
                          hasMore: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }

components:
  securitySchemes:
    bearerJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        NaaP user session JWT. Obtained from the NaaP login flow and stored
        in the `naap_auth_token` localStorage key on the web client. Plans
        are scoped to the caller's `teamId` and `ownerUserId`.
    bearerApiKey:
      type: http
      scheme: bearer
      description: |
        Service Gateway API key in the form `gw_xxxxxxxx`. Created from
        **Service Gateway → API Keys** in the NaaP dashboard. Recommended
        for external SDK and signer integrations.
    bearerCronSecret:
      type: http
      scheme: bearer
      description: |
        Internal `CRON_SECRET` shared with Vercel Cron. Not for end users.

  parameters:
    PlanId:
      name: id
      in: path
      required: true
      schema: { type: string, description: "Plan UUID/CUID returned by createPlan" }

  responses:
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    Forbidden:
      description: Authenticated but lacking required permission
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    NotFound:
      description: Resource not found or not visible to the caller
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  schemas:
    SuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, const: true }
        data: {}

    ErrorEnvelope:
      type: object
      required: [success, error]
      properties:
        success: { type: boolean, const: false }
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - VALIDATION_ERROR
                - UNAUTHORIZED
                - FORBIDDEN
                - NOT_FOUND
                - UPSTREAM_ERROR
                - GATEWAY_TIMEOUT
                - INTERNAL_ERROR
            message: { type: string }

    Capability:
      type: string
      pattern: "^[a-zA-Z0-9_-]+$"
      maxLength: 128
      description: "Capability identifier (e.g. `streamdiffusion-sdxl`, `noop`)."
      examples: [streamdiffusion-sdxl, image-to-video, noop]

    LeaderboardFilters:
      type: object
      additionalProperties: false
      properties:
        gpuRamGbMin: { type: number, minimum: 0 }
        gpuRamGbMax: { type: number, minimum: 0 }
        priceMax: { type: number, minimum: 0 }
        maxAvgLatencyMs: { type: number, minimum: 0 }
        maxSwapRatio: { type: number, minimum: 0, maximum: 1 }

    SLAWeights:
      type: object
      additionalProperties: false
      description: |
        Weights for the SLA composite score. Each weight is in `[0, 1]`. Weights
        do not need to sum to 1 — they are normalised internally. Higher weight
        on a metric means that metric counts more (lower latency / swap / price
        is always better).
      properties:
        latency: { type: number, minimum: 0, maximum: 1, default: 0.4 }
        swapRate: { type: number, minimum: 0, maximum: 1, default: 0.3 }
        price: { type: number, minimum: 0, maximum: 1, default: 0.3 }

    PlanSortBy:
      type: string
      enum: [slaScore, latency, price, swapRate, avail]

    CreatePlanInput:
      type: object
      required: [billingPlanId, name, capabilities]
      properties:
        billingPlanId:
          type: string
          minLength: 1
          maxLength: 255
          description: |
            External, caller-owned identifier (e.g. your billing plan SKU).
            **Globally unique** across the platform.
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 1000
        capabilities:
          type: array
          minItems: 1
          maxItems: 50
          items: { $ref: "#/components/schemas/Capability" }
        topN:
          type: integer
          minimum: 1
          maximum: 1000
          default: 10
        slaWeights: { $ref: "#/components/schemas/SLAWeights" }
        slaMinScore:
          type: number
          minimum: 0
          maximum: 1
          description: Drop orchestrators whose computed SLA score is below this.
        sortBy: { $ref: "#/components/schemas/PlanSortBy" }
        filters: { $ref: "#/components/schemas/LeaderboardFilters" }

    UpdatePlanInput:
      type: object
      description: |
        Partial update — any subset of `CreatePlanInput` (excluding
        `billingPlanId`, which is immutable). Also supports `enabled`.
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        description: { type: string, maxLength: 1000 }
        capabilities:
          type: array
          minItems: 1
          maxItems: 50
          items: { $ref: "#/components/schemas/Capability" }
        topN: { type: integer, minimum: 1, maximum: 1000 }
        slaWeights:
          oneOf:
            - $ref: "#/components/schemas/SLAWeights"
            - type: "null"
        slaMinScore:
          oneOf:
            - { type: number, minimum: 0, maximum: 1 }
            - type: "null"
        sortBy:
          oneOf:
            - $ref: "#/components/schemas/PlanSortBy"
            - type: "null"
        filters:
          oneOf:
            - $ref: "#/components/schemas/LeaderboardFilters"
            - type: "null"
        enabled: { type: boolean }

    DiscoveryPlan:
      type: object
      required:
        - id
        - billingPlanId
        - name
        - capabilities
        - topN
        - enabled
        - createdAt
        - updatedAt
      properties:
        id: { type: string, description: "Plan UUID/CUID" }
        billingPlanId: { type: string }
        name: { type: string }
        description: { type: [string, "null"] }
        teamId: { type: [string, "null"] }
        ownerUserId: { type: [string, "null"] }
        capabilities:
          type: array
          items: { $ref: "#/components/schemas/Capability" }
        topN: { type: integer }
        slaWeights:
          oneOf:
            - $ref: "#/components/schemas/SLAWeights"
            - type: "null"
        slaMinScore: { type: [number, "null"] }
        sortBy:
          oneOf:
            - $ref: "#/components/schemas/PlanSortBy"
            - type: "null"
        filters:
          oneOf:
            - $ref: "#/components/schemas/LeaderboardFilters"
            - type: "null"
        enabled: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    PlanListEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [plans]
              properties:
                plans:
                  type: array
                  items: { $ref: "#/components/schemas/DiscoveryPlan" }

    OrchestratorRow:
      type: object
      required:
        - orchUri
        - gpuName
        - gpuGb
        - avail
        - totalCap
        - pricePerUnit
      properties:
        orchUri:
          type: string
          format: uri
          description: Reachable orchestrator base URL.
        gpuName: { type: string, description: "GPU model name." }
        gpuGb: { type: number, description: "GPU VRAM in GB." }
        avail: { type: integer, description: "Currently available capacity." }
        totalCap: { type: integer, description: "Total advertised capacity." }
        pricePerUnit: { type: number, description: "Price per unit (gateway-defined)." }
        bestLatMs: { type: [number, "null"], description: "Best observed latency, ms." }
        avgLatMs: { type: [number, "null"], description: "Rolling average latency, ms." }
        swapRatio: { type: [number, "null"], description: "Swap ratio in [0, 1] — lower is better." }
        avgAvail: { type: [number, "null"], description: "Average availability over the window." }
        slaScore:
          type: number
          minimum: 0
          maximum: 1
          description: |
            Composite SLA score. Present only when the request supplied
            `slaWeights` (rank endpoint) or the plan has `slaWeights` set.

    PlanResults:
      type: object
      required: [planId, refreshedAt, capabilities, meta]
      properties:
        planId: { type: string }
        refreshedAt: { type: string, format: date-time }
        capabilities:
          type: object
          description: |
            Map of `capabilityName` → ranked rows. Each capability list is
            already sorted, filtered, and capped to the plan's `topN`.
          additionalProperties:
            type: array
            items: { $ref: "#/components/schemas/OrchestratorRow" }
        plan:
          type: object
          description: Plan metadata echoed for convenience.
          properties:
            name: { type: string }
            description: { type: [string, "null"] }
            capabilities:
              type: array
              items: { $ref: "#/components/schemas/Capability" }
            topN: { type: integer }
        meta:
          type: object
          required: [totalOrchestrators, refreshIntervalMs, cacheAgeMs]
          properties:
            totalOrchestrators: { type: integer }
            refreshIntervalMs: { type: integer }
            cacheAgeMs: { type: integer }

    RankRequest:
      type: object
      required: [capability]
      properties:
        capability: { $ref: "#/components/schemas/Capability" }
        topN:
          type: integer
          minimum: 1
          maximum: 1000
          default: 10
        filters: { $ref: "#/components/schemas/LeaderboardFilters" }
        slaWeights: { $ref: "#/components/schemas/SLAWeights" }

    DatasetConfig:
      type: object
      required: [refreshIntervalHours, updatedAt]
      properties:
        refreshIntervalHours:
          type: integer
          enum: [1, 4, 8, 12]
        lastRefreshedAt: { type: [string, "null"], format: date-time }
        lastRefreshedBy: { type: [string, "null"] }
        updatedAt: { type: string, format: date-time }

    DatasetSnapshot:
      type: object
      required: [populated, capabilities, meta]
      properties:
        populated: { type: boolean }
        capabilities:
          type: object
          additionalProperties:
            type: array
            items: { $ref: "#/components/schemas/OrchestratorRow" }
        meta:
          type: object
          properties:
            totalOrchestrators: { type: integer }
            capabilityCount: { type: integer }
            refreshedAt: { type: [string, "null"], format: date-time }
            refreshedBy: { type: [string, "null"] }
            ageMs: { type: integer }
            refreshIntervalHours: { type: integer }
            lastRefreshedAt: { type: [string, "null"], format: date-time }
            lastRefreshedBy: { type: [string, "null"] }

    SourceKind:
      type: string
      enum: [livepeer-subgraph, clickhouse-query, naap-discover, naap-pricing]
      description: Identifier for a leaderboard data source adapter

    LeaderboardSource:
      type: object
      required: [kind, enabled, priority, updatedAt]
      properties:
        kind: { $ref: "#/components/schemas/SourceKind" }
        enabled: { type: boolean }
        priority:
          type: integer
          minimum: 1
          description: Lower number = higher priority. Tier-1 owns membership.
        config:
          type: [object, "null"]
          description: Optional per-source overrides (e.g. timeout, page size)
        updatedAt: { type: string, format: date-time }

    RefreshAudit:
      type: object
      required: [id, refreshedAt, refreshedBy, durationMs, membershipSource, totalOrchestrators, totalCapabilities, perSource, conflicts, dropped, warnings]
      properties:
        id: { type: string }
        refreshedAt: { type: string, format: date-time }
        refreshedBy:
          type: string
          description: "'cron' or 'admin:<userId>'"
        durationMs: { type: integer }
        membershipSource: { $ref: "#/components/schemas/SourceKind" }
        totalOrchestrators: { type: integer }
        totalCapabilities: { type: integer }
        perSource:
          type: object
          additionalProperties:
            type: object
            properties:
              ok: { type: boolean }
              fetched: { type: integer }
              durationMs: { type: integer }
              errorMessage: { type: string }
        conflicts:
          type: array
          items:
            type: object
            properties:
              orchKey: { type: string }
              field: { type: string }
              winner: { type: string }
              losers:
                type: array
                items:
                  type: object
                  properties:
                    source: { type: string }
                    value: {}
        dropped:
          type: array
          items:
            type: object
            properties:
              orchKey: { type: string }
              source: { type: string }
              reason: { type: string }
        warnings:
          type: array
          items: { type: string }
