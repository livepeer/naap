# Example: Deploy a Docker service to a remote machine via SSH Bridge
# Copy this to .github/workflows/ and configure secrets/variables.
name: Deploy Docker Service

on:
  push:
    branches: [main]
    paths: ['src/**', 'Dockerfile']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: type=sha
      - uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH Bridge
        uses: ./.github/actions/ssh-bridge-deploy
        with:
          naap-url: ${{ vars.NAAP_URL }}
          api-key: ${{ secrets.NAAP_GW_API_KEY }}
          host: ${{ vars.DEPLOY_HOST }}
          username: deploy
          environment: production
          script: |
            #!/bin/bash
            set -euo pipefail
            IMAGE="${{ needs.build.outputs.image-tag }}"

            echo "=== Pulling $IMAGE ==="
            docker pull "$IMAGE"

            echo "=== Stopping old container ==="
            docker stop myapp 2>/dev/null || true
            docker rm myapp 2>/dev/null || true

            echo "=== Starting new container ==="
            docker run -d --name myapp \
              --restart unless-stopped \
              -p 8080:8080 \
              "$IMAGE"

            echo "=== Health check ==="
            for i in $(seq 1 20); do
              if curl -sf http://localhost:8080/health; then
                echo ""
                echo "Healthy after $((i * 5))s"
                exit 0
              fi
              sleep 5
            done
            echo "Health check failed after 100s"
            docker logs myapp --tail 50
            exit 1
