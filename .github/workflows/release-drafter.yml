name: Release Drafter

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  update-release-draft:
    runs-on: ubuntu-latest
    steps:
      # On pull_request events the GITHUB_TOKEN is read-only (especially for
      # Dependabot PRs), so release-drafter v7 cannot create the draft release
      # and the job fails with "Resource not accessible by integration". Use
      # dry-run on PRs to preview the payload without writing; push-to-main
      # runs with full permissions and performs the real update.
      - uses: release-drafter/release-drafter@v7
        with:
          dry-run: ${{ github.event_name == 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
